services:
  db:
    image: postgres:18-alpine
    container_name: campusxp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - campusxp_net

  backend:
    build: ./server
    container_name: campusxp_be
    restart: unless-stopped
    networks:
      - campusxp_net
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./ui
    container_name: campusxp_fe
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_APP_ENV=production
      - INTERNAL_API_URL=http://backend:8080/api/v1
    depends_on:
      - backend
    networks:
      - campusxp_net

volumes:
  pg_data:
  seaweed_data:

networks:
  campusxp_net:
    driver: bridge